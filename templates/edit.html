{% extends "base.html" %}

{% block title %}Edit a Release — Music Library{% endblock %}
{% block window_title %}Edit Release{% endblock %}
{% block status_left %}Edit a Release in your library{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="window auth-dialog">
        <div class="title-bar">
            <div class="title-bar-text">Edit Release Info</div>
            <div class="title-bar-controls">
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <form method="post" action="">
                <fieldset>
                    <legend>Release details</legend>
                    <div class="field-row-stacked">
                        <label for="title">Title</label>
                        <input id="title" name="title" type="text"
                               required autofocus value="{{ release.title }}">
                    </div>
                    <div class="field-row-stacked">
                        <label for="contributors">Artist/Contributors</label>
                        <input id="contributors" name="contributors" type="text" required value="{{release.contributors}}">
                    </div>
                    <div class="field-row-stacked">
                        <label for="r_type">Type</label>
                        <select id="r_type" name="r_type" required>
                            <option value="Album"       {% if release.r_type == 'Album' %}selected{% endif %}>Album</option>
                            <option value="EP"          {% if release.r_type == 'EP' %}selected{% endif %}>EP</option>
                            <option value="Single"      {% if release.r_type == 'Single' %}selected{% endif %}>Single</option>
                            <option value="Compilation" {% if release.r_type == 'Compilation' %}selected{% endif %}>Compilation</option>
                        </select>
                    </div>

                    <div class="field-row-stacked">
                        <label for="format">Format</label>
                        <select id="format" name="format" required>
                            <option value="Digital"  {% if release.format == 'Digital' %}selected{% endif %}>Digital</option>
                            <option value="CD"       {% if release.format == 'CD' %}selected{% endif %}>CD</option>
                            <option value="Vinyl"    {% if release.format == 'Vinyl' %}selected{% endif %}>Vinyl</option>
                            <option value="Cassette" {% if release.format == 'Cassette' %}selected{% endif %}>Cassette</option>
                        </select>
                    </div>
                    <div class="field-row-stacked">
                        <label for="r_date">Release Date</label>
                        <input id="r_date" name="r_date" type="date" required value="{{ release.r_date }}">
                    </div>
                <div class="field-row-stacked">
                        <label for="r_label">Label</label>
                        <input id="r_label" name="r_label" type="text" required value="{{ release.r_label }}">
                    </div>
                <div class="field-row-stacked">
                        <label for="cover">Cover URL</label>
                        <input id="cover" name="cover" type="url" value="{{ release.cover }}">
                    </div>
                <div class="field-row-stacked">
                        <label for="details">Details</label>
                        <textarea id="details" name="details" rows="3" maxlength="200">{{ release.details }}</textarea>
                    </div>
                </fieldset>
                <section class="auth-actions">
                    <button type="submit">Save Changes</button>
                    <a href="{{ url_for('release_detail', release_id=release.id) }}"><button type="button">Cancel</button></a>
                </section>
            </form>
        </div>
    </div>
</div>
{% endblock %}
